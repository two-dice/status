name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "readme"
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "site"
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "graphs"
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "response-time"
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "summary"
