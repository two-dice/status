name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "uptime"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
      - uses: upptime/uptime-monitor@v1.37.0
        with:
          command: "summary"
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
